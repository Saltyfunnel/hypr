# ~/.config/hypr/hyprland.conf
# Pywal + Hyprland minimal config

# --- Monitor ---
monitor=HDMI-A-1, 1920x1080@144, 0,0, 1

# --- Gaps & Padding ---
gaps_in=5
gaps_out=5
padding_top=0
padding_bottom=0
padding_left=0
padding_right=0

# --- General ---
general:
    vsync=true
    dpi=96

# --- Wallpaper (handled by hyprpaper) ---
exec-once=hyprpaper --random ~/Pictures/wallpaper.jpg

# --- Keybindings ---
bind=SUPER+ENTER, exec, kitty
bind=SUPER+D, exec, tofi
bind=SUPER+Q, closewindow
bind=SUPER+TAB, workspace next

# --- Floating rules ---
floating=[class="^$"]

# --- Layouts ---
workspace-layout=master|stack

# --- Colors (from pywal) ---
# This file will be overwritten by a small script after Pywal runs
include=~/.config/hypr/colors.conf

# --- Autostart apps ---
exec-once=dunst
exec-once=waybar
exec-once=pipewire
exec-once=wireplumber
exec-once=starship
