# ~/.config/hypr/hyprland.conf
# Pywal + Hyprland minimal config

# --- Monitor ---
monitor=HDMI-A-1,1920x1080@144,0,0,1

# --- Gaps & Padding ---
gaps_in=5
gaps_out=5
padding_top=0
padding_bottom=0
padding_left=0
padding_right=0

# --- General ---
vsync=true
dpi=96

# --- Wallpaper (handled by hyprpaper) ---
exec-once=/usr/bin/hyprpaper --random /home/username/Pictures/wallpaper.jpg

# --- Keybindings ---
bind=SUPER+ENTER,exec,kitty
bind=SUPER+D,exec,tofi
bind=SUPER+Q,closewindow
bind=SUPER+TAB,workspace next

# --- Floating rules ---
# Example: floating apps by class; empty regex removed
floating=[class="^Gimp$"]

# --- Layouts ---
workspace-layout=master|stack

# --- Colors (from Pywal) ---
# Overwritten by Pywal script
include=/home/username/.config/hypr/colors.conf

# --- Autostart apps ---
exec-once=/usr/bin/dunst
exec-once=/usr/bin/waybar
exec-once=/usr/bin/starship
# Optional: pipewire/wireplumber handled as system services, not exec-once

# --- Wallpaper & Pywal scripts ---
exec-once=/home/username/.config/scripts/set-wallpaper.sh
exec-once=/home/username/.config/scripts/wal-hypr.sh